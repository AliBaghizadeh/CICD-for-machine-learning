name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies & Deploy to Hugging Face 🚀
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e # Exit immediately if any command fails

          echo "--- 1. Installation ---"
          # Install all dependencies (using python -m pip for environment correctness)
          python -m pip install -r requirements.txt
          
          # 🚨 CRITICAL FIX: Use --force-reinstall to ensure the executable script is physically written
          python -m pip install "huggingface_hub[cli]" --no-cache-dir --upgrade --force-reinstall
          
          # 🚨 DEBUG FLAG: Print all commands and arguments before they are executed
          set -x
          
          echo "--- 2. Find and Verify CLI Path ---"
          
          HF_CLI_PATH=""
          
          # 2a. Check 1: Primary installation directory (from sysconfig)
          PRIMARY_PATH=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")/huggingface-cli
          
          if [ -f "$PRIMARY_PATH" ]; then
              HF_CLI_PATH="$PRIMARY_PATH"
              echo "✅ Primary path found."
          else
              echo "Primary path not found. Checking local user path..."
              
              # 2b. Check 2: User local binary directory ($HOME/.local/bin)
              LOCAL_USER_PATH="$HOME/.local/bin/huggingface-cli"
              if [ -f "$LOCAL_USER_PATH" ]; then
                  HF_CLI_PATH="$LOCAL_USER_PATH"
                  echo "✅ Local user path found."
              else
                  echo "Local user path not found. Starting broad search..."
                  
                  # 2c. Check 3: Broad search (searches entire filesystem)
                  # Errors are redirected to /dev/null to prevent long log output from restricted directories
                  HF_CLI_PATH=$(find / -name "huggingface-cli" -type f -print -quit 2>/dev/null)
                  
                  if [ -z "$HF_CLI_PATH" ]; then
                      echo "🔴 ERROR: Could not locate the 'huggingface-cli' executable anywhere on the system."
                      exit 1
                  fi
                  echo "✅ Broad search successful."
              fi
          fi
          
          echo "EXECUTABLE FOUND AT: $HF_CLI_PATH"
          HF_CLI_COMMAND="$HF_CLI_PATH"

          echo "--- 3. Deployment (using verified path) ---"
          
          # 1. Login
          $HF_CLI_COMMAND login --token $HF_TOKEN --add-to-git-credential
          
          # 2. Upload App (Source path: ./App/energy_app.py -> Target file: app.py)
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./App/energy_app.py app.py --repo-type=space --commit-message="Deploy App"
          
          # 3. Upload Requirements
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./requirements.txt requirements.txt --repo-type=space --commit-message="Sync Requirements"
          
          # 4. Upload Model
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./Model /Model --repo-type=space --commit-message="Sync Model"
          
          # 5. Upload Results
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./Results /Metrics --repo-type=space --commit-message="Sync Metrics and Report"
          
          echo "Deployment complete."