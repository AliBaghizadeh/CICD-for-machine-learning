# .github/workflows/cd.yml

name: Continuous Deployment
on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update # Checkout the 'update' branch where the model lives

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Project Dependencies (for deploy.py)
        run: pip install -r requirements.txt

      - name: Deployment To Hugging Face
        # We explicitly pass the secret as a command-line argument (variable) to make.
        run: make deploy HF_TOKEN=${{ secrets.HF_TOKEN }}