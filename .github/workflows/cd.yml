name: Continuous Deployment

on:
  # 1. Triggered only after the Continuous Integration (CI) workflow completes successfully
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
  
  # 2. Allows manual running from the GitHub Actions tab
  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN here, but HF_TOKEN in the script below
        run: |
          set -e
          
          echo "Installing dependencies and CLI..."
          pip install -r requirements.txt --no-cache-dir
          pip install "huggingface_hub[cli]" --no-cache-dir
          
          # 🚨 CRITICAL FIX: Find the exact user-site package bin path and add it to PATH
          # This is the most reliable way to find the 'huggingface-cli' executable.
          export PATH="$(python -m site --user-base)/bin:$PATH"
          
          echo "Starting deployment via huggingface-cli..."
          
          # 1. Login
          huggingface-cli login --token ${{ secrets.HF_TOKEN }} --add-to-git-credential
          
          # 2. Upload App (Source path: ./App/energy_app.py -> Target file: app.py)
          huggingface-cli upload alibaghizade/time_series_energy ./App/energy_app.py app.py --repo-type=space --commit-message="Deploy App with UI Update"
          
          # 3. Upload Requirements
          huggingface-cli upload alibaghizade/time_series_energy ./requirements.txt requirements.txt --repo-type=space --commit-message="Sync Requirements"
          
          # 4. Upload Model (Source: ./Model folder -> Target: /Model folder on Hugging Face)
          huggingface-cli upload alibaghizade/time_series_energy ./Model /Model --repo-type=space --commit-message="Sync Model"
          
          # 5. Upload Results (Source: ./Results folder -> Target: /Metrics folder on Hugging Face)
          huggingface-cli upload alibaghizade/time_series_energy ./Results /Metrics --repo-type=space --commit-message="Sync Metrics and Report"
          
          echo "Deployment complete."