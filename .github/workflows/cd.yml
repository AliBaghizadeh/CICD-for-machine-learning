name: Continuous Deployment

on:
  # 1. Triggered only after the Continuous Integration (CI) workflow completes successfully
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
  
  # 2. Allows manual running from the GitHub Actions tab
  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Deploy to Hugging Face
        # ⚠️ CRITICAL: Ensure 'env:' is indented exactly the same as 'name:'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # The 'run:' block must be correctly indented relative to 'name:'
        run: |
          set -e
          export PATH="$HOME/.local/bin:$PATH"
          
          echo "Installing dependencies and CLI..."
          pip install -r requirements.txt --no-cache-dir
          pip install "huggingface_hub[cli]" --no-cache-dir
          
          echo "Verifying huggingface-cli installation..."
          which huggingface-cli || (echo "CLI not in PATH, trying python -m huggingface_hub.cli"; python -m huggingface_hub.cli --help)
          
          echo "Starting deployment via huggingface-cli..."
          
          # 2. Login
          python -m huggingface_hub.cli login --token $HF_TOKEN --add-to-git-credential
          
          # 3. Upload App (Source path: ./App/energy_app.py -> Target file: app.py)
          python -m huggingface_hub.cli upload alibaghizade/time_series_energy ./App/energy_app.py app.py --repo-type=space --commit-message="Deploy App with UI Update"
          
          # 4. Upload Requirements
          python -m huggingface_hub.cli upload alibaghizade/time_series_energy ./requirements.txt requirements.txt --repo-type=space --commit-message="Sync Requirements"
          
          # 5. Upload Model (Source: ./Model folder -> Target: /Model folder on Hugging Face)
          python -m huggingface_hub.cli upload alibaghizade/time_series_energy ./Model /Model --repo-type=space --commit-message="Sync Model"
          
          # 6. Upload Results (Source: ./Results folder -> Target: /Metrics folder on Hugging Face)
          python -m huggingface_hub.cli upload alibaghizade/time_series_energy ./Results /Metrics --repo-type=space --commit-message="Sync Metrics and Report"
          
          echo "Deployment complete."