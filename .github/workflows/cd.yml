name: Continuous Deployment

on:
  # This workflow runs only after the Continuous Integration workflow successfully completes
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
  # Allows manual running from the GitHub Actions UI
  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    # Only run if the triggering CI workflow was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Check out the 'update' branch which contains the committed Model and Results
          ref: update

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Deploy to Hugging Face via Python API 🚀
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          REPO_ID: alibaghizade/time_series_energy
          REPO_TYPE: space
        # CRITICAL FIX: Use the YAML Literal Block Scalar (|) for reliable multiline script execution.
        run: |
          set -e
          
          # 1. Install dependencies, forcing a re-installation to ensure the package is ready
          echo "Installing core dependencies and huggingface_hub..."
          # Use python -m pip to ensure packages are installed for the active interpreter
          python -m pip install --force-reinstall --no-cache-dir -r requirements.txt
          python -m pip install --force-reinstall --no-cache-dir "huggingface_hub[cli]"

          # 2. Execute deployment using the stable Python API
          echo "Starting deployment via Hugging Face Python API..."
          
          # CRITICAL FIX: Use the bash Heredoc syntax with <<- 'DELIMITER' to correctly pass 
          # a multiline Python script to the interpreter, solving the YAML syntax error.
          python <<- 'EOP'
import os
import sys
from huggingface_hub import login, upload_file, upload_folder
from pathlib import Path

# Repository details taken from environment variables
REPO_ID = os.environ['REPO_ID']
REPO_TYPE = os.environ['REPO_TYPE']

def deploy_app():
    # Helper to check if a directory is valid before attempting to upload
    def check_dir(path):
        if not Path(path).is_dir():
            print(f"Warning: Directory '{path}' not found. Skipping upload.")
            return False
        return True

    try:
        # 1. Login using the token (essential for non-anonymous operations)
        print('-> Logging in to Hugging Face Hub...')
        # Note: add_to_git_credential is False as we are in a temporary CI runner
        login(token=os.environ['HF_TOKEN'], add_to_git_credential=False)
        print('-> Login successful.')

        # 2. Upload App file (./App/energy_app.py -> app.py)
        print('-> Uploading App...')
        upload_file(
            path_or_fileobj='./App/energy_app.py',
            path_in_repo='app.py',
            repo_id=REPO_ID,
            repo_type=REPO_TYPE,
            commit_message='Deploy App'
        )
        print('-> App uploaded.')

        # 3. Upload Requirements
        print('-> Syncing requirements.txt...')
        upload_file(
            path_or_fileobj='./requirements.txt',
            path_in_repo='requirements.txt',
            repo_id=REPO_ID,
            repo_type=REPO_TYPE,
            commit_message='Sync Requirements'
        )
        print('-> requirements.txt synced.')

        # 4. Upload Model directory (Model/ -> /Model)
        if check_dir('./Model'):
            print('-> Uploading Model directory...')
            upload_folder(
                folder_path='./Model',
                repo_id=REPO_ID,
                repo_type=REPO_TYPE,
                path_in_repo='Model',
                commit_message='Sync Model'
            )
            print('-> Model directory uploaded.')

        # 5. Upload Results directory (Results/ -> /Metrics)
        if check_dir('./Results'):
            print('-> Uploading Results directory...')
            upload_folder(
                folder_path='./Results',
                repo_id=REPO_ID,
                repo_type=REPO_TYPE,
                path_in_repo='Metrics', # Renaming the directory to Metrics on the Hub
                commit_message='Sync Metrics and Report'
            )
            print('-> Results directory uploaded.')

        print('\n✅ Deployment to Hugging Face Hub complete.')

    except Exception as e:
        print(f"🔴 Deployment failed: {e}", file=sys.stderr)
        sys.exit(1)

if __name__ == '__main__':
    deploy_app()
EOP