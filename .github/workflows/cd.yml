# .github/workflows/cd.yml

name: Continuous Deployment
on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update # Checkout the 'update' branch where the model lives

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Project Dependencies (for deploy.py)
        run: pip install -r requirements.txt

      - name: Deployment To Hugging Face
        # IMPORTANT: We define the environment variable HF_TOKEN for the shell 
        # before running 'make deploy'.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # The 'make deploy' command runs the python script, and since HF_TOKEN 
        # is set in the environment, the python script can now read it 
        # via os.environ.get("HF_TOKEN").
        run: make deploy