name: Continuous Deployment

on:
  # 1. Triggered only after the Continuous Integration (CI) workflow completes successfully
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
  
  # 2. Allows manual running from the GitHub Actions tab
  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install "huggingface_hub[cli]"
          which huggingface-cli || echo "CLI not found in PATH"
          ls -la ~/.local/bin/ || echo "No .local/bin"
          ls -la /opt/hostedtoolcache/Python/3.10.19/x64/bin/ | grep hugging || echo "Not in Python bin"
          
          # Execute the CLI using the explicit Python module command.
          # This guarantees execution without relying on $PATH or a specific bin directory.
          HF_CLI_COMMAND="python -m huggingface_hub.cli"
          
          echo "Starting deployment via Python module: $HF_CLI_COMMAND"
          
          # 1. Login using the Python module command
          $HF_CLI_COMMAND login --token $HF_TOKEN --add-to-git-credential
          
          # 2. Upload App (Source path: ./App/energy_app.py -> Target file: app.py)
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./App/energy_app.py app.py --repo-type=space --commit-message="Force UI Update (App Logic)"
          
          # 3. Upload Requirements
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./requirements.txt requirements.txt --repo-type=space --commit-message="Sync Requirements"
          
          # 4. Upload Model
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./Model /Model --repo-type=space --commit-message="Sync Model"
          
          # 5. Upload Results
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./Results /Metrics --repo-type=space --commit-message="Sync Metrics and Report"
          
          echo "Deployment complete."