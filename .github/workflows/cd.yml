name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies & Fix PATH 🛠️
        run: |
          pip install -r requirements.txt
          pip install "huggingface_hub[cli]"
          
          # CRITICAL: Get the exact path where pip installed the scripts (like huggingface-cli)
          # and add it to the system PATH so 'make' can find it.
          SCRIPT_PATH=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          echo "$SCRIPT_PATH" >> $GITHUB_PATH
          
      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Now we just call make. The PATH is fixed, so huggingface-cli will work.
        run: make deploy