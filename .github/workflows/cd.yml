name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies & Deploy to Hugging Face 🚀
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e # Exit immediately if any command fails

          echo "Installing dependencies..."
          # Use 'python -m pip' to guarantee installation into the active environment
          python -m pip install -r requirements.txt
          python -m pip install "huggingface_hub[cli]"
          
          # Stable Execution Command (bypasses shell PATH issues)
          #HF_CLI_COMMAND="python -m huggingface_hub.cli"
          #echo "Starting deployment via Python module: $HF_CLI_COMMAND"
          HF_CLI_COMMAND="python -m huggingface_hub"
          echo "Starting deployment via Python module: $HF_CLI_COMMAND"

          # 1. Login
          $HF_CLI_COMMAND login --token $HF_TOKEN --add-to-git-credential
          
          # 2. Upload App (Source path: ./App/energy_app.py -> Target file: app.py)
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./App/energy_app.py app.py --repo-type=space --commit-message="Deploy App"
          
          # 3. Upload Requirements
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./requirements.txt requirements.txt --repo-type=space --commit-message="Sync Requirements"
          
          # 4. Upload Model
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./Model /Model --repo-type=space --commit-message="Sync Model"
          
          # 5. Upload Results
          $HF_CLI_COMMAND upload alibaghizade/time_series_energy ./Results /Metrics --repo-type=space --commit-message="Sync Metrics and Report"
          
          echo "Deployment complete."