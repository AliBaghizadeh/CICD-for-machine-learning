# .github/workflows/cd.yml

name: Continuous Deployment
on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Project Dependencies and Hugging Face CLI
        # Step 1: Install dependencies and CLI.
        run: |
          pip install -r requirements.txt
          pip install "huggingface_hub[cli]"
          
      - name: Set PATH for Hugging Face CLI (CRITICAL FIX) 🛠️
        # Step 2: This command finds the path where pip installed the user binaries 
        # (usually ~/.local/bin) and adds it to the runner's PATH for subsequent steps.
        run: |
          PYTHON_BIN_PATH=$(python -c 'import site; print(site.USER_BASE + "/bin")')
          echo "$PYTHON_BIN_PATH" >> $GITHUB_PATH
          
      - name: Deployment To Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Step 3: Run make deploy. It should now find the CLI tool.
        run: make deploy HF_TOKEN=${{ secrets.HF_TOKEN }}