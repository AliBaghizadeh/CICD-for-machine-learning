# .github/workflows/cd.yml

name: Continuous Deployment
on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

  workflow_dispatch:

jobs:
  cd-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Update Branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: update

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Final Deployment (Single Shell Execution) 🛠️
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Install all required dependencies, including the CLI.
          # This must be in the same block as 'make deploy'.
          pip install -r requirements.txt
          pip install "huggingface_hub[cli]"
          
          # 2. Execute the Makefile target (This ensures 'huggingface-cli' is found)
          make deploy HF_TOKEN=$HF_TOKEN